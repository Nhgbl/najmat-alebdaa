{% extends 'main/base.html' %}
{% block title %}الأسئلة الشائعة - مؤسسة نجمة الإبداع{% endblock %}
{% block content %}

<div class="hero-section">
    <div class="container">
        <h1 class="text-yellow fw-bold mb-4">الأسئلة الشائعة</h1>
        <p class="lead fs-3 text-muted">إجابات وافية لأسئلتك</p>
    </div>
</div>

<div class="section py-5">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div class="accordion" id="faqAccordion">
                    {% for faq in faqs %}
                    <div class="accordion-item bg-dark border-warning mb-3" style="border-radius: 12px; overflow: hidden;">
                        <h2 class="accordion-header">
                            <button class="accordion-button {% if not forloop.first %}collapsed{% endif %} bg-dark text-yellow fw-bold p-4 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#faq{{ forloop.counter }}">
                                <i class="fas fa-question-circle me-3"></i> {{ faq.question }}
                            </button>
                        </h2>
                        <div id="faq{{ forloop.counter }}" class="accordion-collapse collapse {% if forloop.first %}show{% endif %}" data-bs-parent="#faqAccordion">
                            <div class="accordion-body text-muted p-4" style="background-color: var(--card-bg);">
                                {{ faq.answer }}
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</div>

<div class="section py-5" style="background-color: var(--dark-gray);">
    <div class="container text-center">
        <h2 class="section-title text-yellow mb-5">لم تجد إجابتك؟</h2>
        <a href="https://wa.me/{{ site_settings.whatsapp }}" target="_blank" class="btn btn-yellow btn-lg px-5 py-3 fs-5 me-3">
            <i class="fab fa-whatsapp me-2"></i> تواصل عبر الواتساب
        </a>
    </div>
</div>
{% endblock %}
